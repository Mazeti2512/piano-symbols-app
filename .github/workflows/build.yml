name: Build Windows Installer

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show files
        run: dir

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Windows installer
        run: npm run dist

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: piano-symbols-windows-installer
          path: release/*.exe
