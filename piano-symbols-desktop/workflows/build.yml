name: Build Windows Installer

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install
        working-directory: piano-symbols-desktop

      - name: Build app
        run: npm run dist
        working-directory: piano-symbols-desktop

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: piano-symbols-windows-installer
          path: piano-symbols-desktop/dist/*.exe